<div class="d-flex justify-content-center align-items-center vh-100 bg-gradient">
  <div class="card border-0 shadow-lg p-4" style="min-width: 380px; max-width: 420px; border-radius: 1rem;">
    
    <!-- Header with icon and title -->
    <div class="text-center mb-4">
      <div class="rounded-circle bg-primary text-white d-inline-flex justify-content-center align-items-center mb-3" style="width:70px; height:70px;">
        <i class="bi bi-mortarboard fs-2"></i>
      </div>
      <h3 class="fw-bold text-primary">EcoleConnect</h3>
      <p class="text-muted small mb-0">Portail de gestion scolaire</p>
    </div>

    <form #signInNgForm="ngForm" (ngSubmit)="login()" autocomplete="off">
      <!-- Error alert -->
      <div *ngIf="showAlert" class="alert alert-danger text-center py-2 mb-3 rounded-pill">
        {{ message }}
      </div>

      <!-- Email -->
      <div class="form-floating mb-3">
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="authrequest.email"
          required
          email
          class="form-control rounded-3"
          placeholder="exemple@email.com"
          #email="ngModel"
        />
        <label for="email"><i class="bi bi-envelope-fill me-2 text-primary"></i>Adresse email</label>
        <div *ngIf="email.invalid && email.touched" class="text-danger small mt-1">
          Email invalide
        </div>
      </div>

      <!-- Password -->
      <div class="form-floating mb-4">
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="authrequest.password"
          required
          minlength="4"
          class="form-control rounded-3"
          placeholder="Mot de passe"
          #password="ngModel"
        />
        <label for="password"><i class="bi bi-lock-fill me-2 text-primary"></i>Mot de passe</label>
        <div *ngIf="password.invalid && password.touched" class="text-danger small mt-1">
          Mot de passe requis
        </div>
      </div>

      <!-- Submit button -->
      <button
        type="submit"
        class="btn btn-primary w-100 py-2 fw-semibold shadow-sm rounded-pill"
        [disabled]="signInNgForm.invalid || isSubmitting"
      >
        <i class="bi bi-box-arrow-in-right me-2"></i>Connexion
      </button>
    </form>

    <!-- Footer links -->
    <div class="text-center mt-4">
      <a href="#" class="small text-decoration-none text-muted">
        <i class="bi bi-question-circle me-1"></i>Mot de passe oublié ?
      </a>
      <div class="mt-2">
        <span class="small text-muted">Vous n’avez pas de compte ?</span>
        <a routerLink="/register" class="small text-primary fw-semibold">Créer un compte</a>
      </div>
    </div>

  </div>
</div>

<div class="contact-container">
    <h2 class="title">📞 Contactez l'administration</h2>
    <p class="subtitle">Vous pouvez nous envoyer un message en remplissant le formulaire ci-dessous :</p>
  
    <form (ngSubmit)="sendMessage()" class="contact-form">
      <div class="form-group">
        <label>Nom complet</label>
        <input type="text" [(ngModel)]="name" name="name" required placeholder="Entrez votre nom complet" />
      </div>
  
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="exemple@email.com" />
      </div>
  
      <div class="form-group">
        <label>Message</label>
        <textarea [(ngModel)]="message" name="message" rows="4" required placeholder="Votre message..."></textarea>
      </div>
  
      <button type="submit" class="btn-submit">Envoyer</button>
    </form>
  </div>

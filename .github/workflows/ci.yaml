name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches:
      - main 

jobs:
  # This workflow contains a single job called "build"
  build:
    # La machine qui va lancer mes processus
    runs-on: ubuntu-latest
  # La Séquence des étapes qui vont etres executées
    steps:
    # ces lignes nous permet de faire un clonage depuis notre répertoire dans github
    - name: checkout code source
      uses: actions/checkout@v4

    # ces lignes nous permet de creer le dossier "target"
    - name: build Spring boot
      run : |
       cd EcoleBack 
       chmod +x mvnw
       ./mvnw clean package -DskipTests

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ces lignes nous permets de s'authentifier a docker 
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: build Spring boot image
      run : |
        docker build -t ${{ vars.DOCKERHUB_USERNAME }}/ecoleback-app EcoleBack
        docker push ${{ vars.DOCKERHUB_USERNAME }}/ecoleback-app

    - name: build Angular image
      run : |
        docker build -t ${{ vars.DOCKERHUB_USERNAME }}/ecolefront-app EcoleFront
        docker push ${{ vars.DOCKERHUB_USERNAME }}/ecolefront-app

    - name: run docker compose
      run : |
        docker compose down 
        docker compose up -d 
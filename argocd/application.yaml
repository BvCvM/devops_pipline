apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecole-app
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: >-
      backend=bassemamri/ecoleback-app,
      frontend=bassemamri/ecolefront-app
    argocd-image-updater.argoproj.io/backend.update-strategy: latest
    argocd-image-updater.argoproj.io/frontend.update-strategy: latest
    argocd-image-updater.argoproj.io/backend.allow-tags: "regexp:^build-[0-9]+$"
    argocd-image-updater.argoproj.io/frontend.allow-tags: "regexp:^build-[0-9]+$"
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/github-creds
    argocd-image-updater.argoproj.io/write-back-target: kustomization
    argocd-image-updater.argoproj.io/git-branch: main

spec:
  project: default
  source:
    repoURL: https://github.com/BvCvM/devops_pipline
    targetRevision: main
    path: Kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true